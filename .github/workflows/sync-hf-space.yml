name: Sync Backend to HuggingFace Space

on:
    push:
        branches: [master]
        paths:
            - "backend/**"

jobs:
    sync-to-hf:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Push backend to HuggingFace Space
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
              run: |
                  # Configure git
                  git config --global user.email "ritesh19180@gmail.com"
                  git config --global user.name "ritesh19180"

                  # Clone the HF Space repo
                  git clone https://ritesh19180:$HF_TOKEN@huggingface.co/spaces/ritesh19180/maitri-ai-backend /tmp/hf-space

                  # Copy backend files (excluding venv and __pycache__)
                  rsync -av --delete \
                    --exclude='venv/' \
                    --exclude='__pycache__/' \
                    --exclude='*.pyc' \
                    backend/ /tmp/hf-space/

                  # Keep the Dockerfile and README from the Space
                  cd /tmp/hf-space

                  # Commit and push
                  git add .
                  git diff --staged --quiet || {
                    git commit -m "Auto-sync backend from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                    git push origin main
                  }

                  echo "✅ Backend synced to HuggingFace Space"
